<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>طباعة الأرشيف - الروابط التفاعلية</title>
    <style>
        @font-face {
            font-family: 'XB Niloofar';
            src: url('https://cdn.jsdelivr.net/gh/Alsaidi5/faisform/XB-NiloofarBd.woff') format('woff');
            font-weight: bold;
        }
        @page { size: A4 landscape; margin: 0; }
        body { margin: 0; background: #525659; font-family: 'XB Niloofar', sans-serif; }
        
        .page-break { 
            page-break-after: always; width: 297mm; height: 210mm; 
            margin: 15px auto; position: relative;
            background-image: url('https://raw.githubusercontent.com/Alsaidi5/faisform/main/template.jpg');
            background-size: 100% 100%; background-color: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        .absolute-text { position: absolute; color: #333; font-weight: bold; pointer-events: none; }
        
        /* الإحداثيات الدقيقة */
        .p-serial { top: 26mm; left: 258mm; font-size: 25pt; color: #fff; width: 20mm; text-align: center; }
        .p-newspaper { top: 50mm; left: 182mm; font-size: 13pt; width: 100mm; text-align: center; color: #fff; }
        .p-date { top: 85mm; left: 194mm; font-size: 14pt; width: 30mm; text-align: center; }
        .p-keywords { top: 123mm; left: 188mm; font-size: 12pt; width: 40mm; text-align: center; line-height: 1.4; }
        
        .p-text { 
            top: 25mm; right: 197mm; width: 75mm; height: 132mm; 
            font-size: 13pt; line-height: 1.4; text-align: justify; 
            overflow: hidden; white-space: pre-wrap; 
        }

        .img-box {
            position: absolute; top: 25mm; left: 107mm; width: 75mm; height: 130mm; 
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .p-img { max-width: 100%; max-height: 100%; object-fit: cover; border-radius: 4px; }

        /* تعديل منطقة الرابط لتكون "فوق" كل شيء وقابلة للنقر */
        .p-link-area {
            position: absolute; 
            top: 140mm; left: 185mm; /* تم تعديل الإحداثيات لتناسب مكان السهم في تصميمك */
            width: 45mm; height: 15mm; 
            z-index: 9999; /* لضمان أنها فوق الصورة والقالب */
            cursor: pointer;
            background: rgba(255, 0, 0, 0); /* جعلناها شفافة تماماً */
            display: block;
        }

        .no-print-toolbar { 
            background: white; padding: 20px; text-align: center; 
            position: sticky; top: 0; z-index: 10000; border-bottom: 3px solid #00796b;
        }
        .btn { padding: 12px 30px; font-weight: bold; cursor: pointer; border-radius: 8px; margin: 0 10px; border: 1px solid #ccc; }
        
        @media print {
            .no-print-toolbar { display: none !important; }
            body { background: none; }
            .page-break { margin: 0; box-shadow: none; }
            /* إظهار الروابط في الـ PDF */
            .p-link-area { background: none !important; }
        }
    </style>
</head>
<body>

<div class="no-print-toolbar">
    <input type="file" id="archivePicker" multiple accept=".json" class="btn" onchange="processArchive(this)">
    <button class="btn" style="background: #00796b; color: white;" onclick="window.print()">طباعة PDF 🖨️</button>
</div>

<div id="master-container"></div>

<script>
    function processArchive(input) {
        const container = document.getElementById('master-container');
        container.innerHTML = ''; 

        Array.from(input.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const news = JSON.parse(e.target.result);
                const page = document.createElement('div');
                page.className = 'page-break';
                
                // إضافة الرابط كـ وسم <a> حقيقي يغطي المنطقة
                page.innerHTML = `
                    <div class="absolute-text p-serial">${news.serial}</div>
                    <div class="absolute-text p-newspaper">${news.newspaper}</div>
                    <div class="absolute-text p-date">${news.date}</div>
                    <div class="absolute-text p-keywords">${news.keywords || ''}</div>
                    <div class="absolute-text p-text">${news.text}</div>
                    <div class="img-box"><img src="${news.image || ''}" class="p-img"></div>
                    <a href="${formatUrl(news.link)}" target="_blank" class="p-link-area" title="اضغط لفتح الرابط"></a>
                `;
                
                container.appendChild(page);
                autoShrink(page.querySelector('.p-text'));
            };
            reader.readAsText(file);
        });
    }

    function formatUrl(url) {
        if(!url || url.trim() === "") return "#";
        let cleanUrl = url.trim();
        if (!cleanUrl.startsWith('http')) {
            cleanUrl = 'https://' + cleanUrl;
        }
        return cleanUrl;
    }

    function autoShrink(element) {
        let size = 13;
        element.style.fontSize = size + "pt";
        while (element.scrollHeight > element.offsetHeight && size > 7) {
            size -= 0.5;
            element.style.fontSize = size + "pt";
        }
    }
</script>
</body>
</html>
